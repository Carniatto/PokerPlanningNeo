name: Deploy to Firebase Hosting on merge
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Inject Secrets into Environment
        run: |
          cat << EOF > src/environments/environment.prod.ts
          export const environment = {
            production: true,
            firebaseConfig: {
              apiKey: "${{ secrets.FIREBASE_API_KEY }}",
              authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId: "${{ secrets.FIREBASE_APP_ID }}",
              measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
            },
            jiraClientId: "13MZVVdvTCbXxq0oQyEy8yEC5YO6EZHn",
            jiraRedirectUri: "https://pokerplanningneo.web.app/auth/callback",
            functionsBaseUrl: "https://europe-west1-pokerplanningneo.cloudfunctions.net"
          };
          EOF
      - run: pnpm install && pnpm run build
      - name: Deploy to Firebase
        run: pnpm exec firebase deploy --except functions --project pokerplanningneo --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
