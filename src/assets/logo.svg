<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc13fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect x="106" y="56" width="300" height="400" rx="30" ry="30" fill="#0a0a12" stroke="url(#grad1)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Circuit Lines -->
  <path d="M150 400 L200 400 L220 380" stroke="#00f3ff" stroke-width="4" fill="none" opacity="0.5" />
  <path d="M362 112 L312 112 L292 132" stroke="#bc13fe" stroke-width="4" fill="none" opacity="0.5" />
  <circle cx="220" cy="380" r="4" fill="#00f3ff" opacity="0.8" />
  <circle cx="292" cy="132" r="4" fill="#bc13fe" opacity="0.8" />

  <!-- Central Symbol (Fibonacci 8) -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="200" fill="url(#grad1)" filter="url(#glow)">P</text>
  
  <!-- Neo Text -->
  <text x="50%" y="80%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#ffffff" letter-spacing="4">NEO</text>
</svg>
