@if (showIntro()) {
<div class="intro-container">
    <div class="content">
        <div class="logo-container">
            <img src="assets/logo.svg" alt="Poker Planning Neo Logo" class="logo-large">
        </div>
        <h1>Welcome to <img src="assets/neo-logo.svg" alt="NEO" class="neo-hero-logo"> Poker Planning</h1>
        <p class="subtitle">The future of agile estimation is here.</p>

        <div class="features">
            <div class="feature-item">
                <span class="icon">🚀</span>
                <span>Real-time Estimation</span>
            </div>
            <div class="feature-item">
                <span class="icon">✨</span>
                <span>Sleek Neo Design</span>
            </div>
            <div class="feature-item">
                <span class="icon">🤝</span>
                <span>Team Collaboration</span>
            </div>
        </div>

        <button class="enter-btn" (click)="enterApp()">ENTER THE MATRIX</button>
    </div>
</div>
}
